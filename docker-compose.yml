version: '3.8'

services:
  web:
    build: .
    container_name: devsecops-app
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
